<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DoOne — Your Next Action Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0B0C1A;
  --bg2: #10132B;
  --bg3: #14182E;
  --card: rgba(255,255,255,0.035);
  --card-b: rgba(255,255,255,0.07);
  --purple: #7C5CFF;
  --purple2: #9B87FF;
  --lav: #C8B6FF;
  --blue: #7DD3FC;
  --t1: #FFFFFF;
  --t2: rgba(255,255,255,0.6);
  --t3: rgba(255,255,255,0.3);
  --green: #4ADE80;
  --orange: #FB923C;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;top:-15%;left:-5%;width:55%;height:55%;background:radial-gradient(circle,rgba(124,92,255,.1) 0%,transparent 65%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;bottom:-10%;right:-5%;width:45%;height:45%;background:radial-gradient(circle,rgba(125,211,252,.06) 0%,transparent 65%);pointer-events:none;z-index:0;}

.app{display:flex;min-height:100vh;position:relative;z-index:1;}

/* ── SIDEBAR ── */
.sidebar{width:230px;min-height:100vh;padding:1.75rem 1rem;background:rgba(255,255,255,.018);border-right:1px solid var(--card-b);display:flex;flex-direction:column;gap:.35rem;position:fixed;left:0;top:0;backdrop-filter:blur(24px);z-index:100;}
.logo{font-family:'Outfit',sans-serif;font-size:1.5rem;font-weight:900;padding:.5rem 1rem 2rem;letter-spacing:-.5px;}
.logo span{background:linear-gradient(135deg,var(--purple2),var(--lav));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-item{display:flex;align-items:center;gap:.7rem;padding:.7rem .9rem;border-radius:14px;cursor:pointer;color:var(--t2);font-size:.865rem;font-weight:500;transition:all .18s;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif;}
.nav-item:hover{background:rgba(124,92,255,.09);color:var(--t1);}
.nav-item.active{background:rgba(124,92,255,.18);color:var(--purple2);}
.nav-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.nav-item.active .nav-icon{background:var(--purple);color:#fff;}

/* ── MAIN ── */
.main{flex:1;margin-left:230px;padding:2rem;max-width:860px;}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--card-b);border-radius:24px;padding:1.5rem;backdrop-filter:blur(20px);}
.card-sm{border-radius:18px;padding:1.2rem;}

/* ── TYPOGRAPHY ── */
.page-title{font-family:'Outfit',sans-serif;font-size:1.45rem;font-weight:700;letter-spacing:-.4px;margin-bottom:.2rem;}
.page-sub{color:var(--t2);font-size:.875rem;}
.section-label{font-size:.78rem;font-weight:600;color:var(--t3);letter-spacing:.3px;margin-bottom:.85rem;text-transform:uppercase;}

/* ── BUTTONS ── */
.btn{padding:.6rem 1.3rem;border-radius:100px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:all .18s;font-family:'DM Sans',sans-serif;}
.btn:hover{transform:translateY(-1px);}
.btn:active{transform:scale(.97);}
.btn-p{background:var(--purple);color:#fff;box-shadow:0 4px 20px rgba(124,92,255,.38);}
.btn-p:hover{background:var(--purple2);box-shadow:0 6px 24px rgba(124,92,255,.48);}
.btn-s{background:rgba(255,255,255,.055);color:var(--t2);border:1px solid rgba(255,255,255,.09);}
.btn-g{background:transparent;color:var(--t2);border:1px solid rgba(255,255,255,.07);}

/* ── TAGS ── */
.tag{display:inline-flex;align-items:center;padding:.18rem .6rem;border-radius:20px;font-size:.7rem;font-weight:600;}
.tg-p{background:rgba(124,92,255,.16);color:var(--purple2);}
.tg-b{background:rgba(125,211,252,.12);color:var(--blue);}
.tg-g{background:rgba(74,222,128,.12);color:var(--green);}
.tg-o{background:rgba(251,146,60,.12);color:var(--orange);}

/* ── PROGRESS ── */
.pbar-wrap{background:rgba(255,255,255,.08);border-radius:100px;height:5px;overflow:hidden;}
.pbar{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--purple),var(--lav));transition:width .5s ease;}

/* ── NOW CARD ── */
.now-card{background:linear-gradient(135deg,rgba(124,92,255,.22) 0%,rgba(155,135,255,.13) 55%,rgba(200,182,255,.06) 100%);border:1px solid rgba(124,92,255,.38);border-radius:28px;padding:1.85rem;position:relative;overflow:hidden;margin:1.35rem 0;}
.now-card::before{content:'';position:absolute;top:-50%;right:-20%;width:380px;height:380px;background:radial-gradient(circle,rgba(124,92,255,.18) 0%,transparent 60%);pointer-events:none;}
.now-label{font-size:.68rem;font-weight:700;letter-spacing:2px;color:var(--purple2);text-transform:uppercase;margin-bottom:.9rem;display:flex;align-items:center;gap:.45rem;}
.now-dot{width:6px;height:6px;border-radius:50%;background:var(--purple2);box-shadow:0 0 8px var(--purple);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.75);}}
.now-title{font-family:'Outfit',sans-serif;font-size:1.8rem;font-weight:700;letter-spacing:-.4px;line-height:1.15;margin-bottom:.6rem;}
.now-meta{display:flex;flex-wrap:wrap;gap:.75rem;color:var(--t2);font-size:.83rem;margin:.6rem 0;}
.now-meta span{display:flex;align-items:center;gap:.3rem;}
.ai-note{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:.7rem 1rem;font-size:.8rem;color:var(--lav);margin:.9rem 0;display:flex;align-items:flex-start;gap:.5rem;line-height:1.5;}
.action-btns{display:flex;gap:.6rem;margin-top:1.1rem;flex-wrap:wrap;}

/* ── PROJECT CARDS ── */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:.9rem;}
.proj-card{background:var(--card);border:1px solid var(--card-b);border-radius:20px;padding:1.2rem;cursor:pointer;transition:all .18s;}
.proj-card:hover{background:rgba(124,92,255,.07);border-color:rgba(124,92,255,.22);transform:translateY(-2px);}
.proj-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;margin-bottom:.7rem;}
.proj-name{font-weight:600;font-size:.88rem;margin-bottom:.2rem;}
.proj-meta{font-size:.75rem;color:var(--t3);}

/* ── SESSIONS ── */
.sess-item{display:flex;align-items:center;gap:.9rem;padding:.8rem 0;border-bottom:1px solid rgba(255,255,255,.05);}
.sess-item:last-child{border-bottom:none;}
.sess-time{font-size:.77rem;color:var(--t3);min-width:44px;font-weight:500;}
.sess-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sess-info{flex:1;}
.sess-name{font-size:.855rem;font-weight:500;margin-bottom:.12rem;}
.sess-dur{font-size:.75rem;color:var(--t3);}

/* ── DATE STRIP ── */
.date-strip{display:flex;gap:.45rem;overflow-x:auto;padding-bottom:.5rem;margin-bottom:1.4rem;scrollbar-width:none;}
.date-strip::-webkit-scrollbar{display:none;}
.date-pill{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:.18rem;padding:.7rem .95rem;border-radius:15px;cursor:pointer;transition:all .18s;background:var(--card);border:1px solid var(--card-b);min-width:52px;}
.date-pill:hover{background:rgba(124,92,255,.1);}
.date-pill.active{background:var(--purple);border-color:var(--purple);}
.day-name{font-size:.67rem;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;}
.day-num{font-family:'Outfit',sans-serif;font-size:1.05rem;font-weight:700;color:var(--t1);}
.date-pill.active .day-name,.date-pill.active .day-num{color:#fff;}

/* ── TIMELINE ── */
.tl-block{display:flex;gap:.9rem;align-items:flex-start;}
.tl-time{font-size:.73rem;color:var(--t3);min-width:42px;padding-top:.9rem;font-weight:500;}
.tl-spine{display:flex;flex-direction:column;align-items:center;padding-top:.95rem;}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--purple);flex-shrink:0;}
.tl-line{width:2px;flex:1;min-height:28px;background:rgba(255,255,255,.06);margin-top:4px;}
.tl-card{flex:1;background:var(--card);border:1px solid var(--card-b);border-radius:16px;padding:.9rem 1.1rem;transition:all .18s;cursor:pointer;margin-bottom:.8rem;}
.tl-card:hover{background:rgba(124,92,255,.06);border-color:rgba(124,92,255,.2);}
.tl-title{font-size:.875rem;font-weight:600;margin-bottom:.25rem;}
.tl-meta{font-size:.75rem;color:var(--t3);display:flex;gap:.6rem;}

/* ── INSIGHTS ── */
.ins-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.9rem;}
.ins-card{background:var(--card);border:1px solid var(--card-b);border-radius:20px;padding:1.2rem;}
.ins-lbl{font-size:.72rem;color:var(--t3);margin-bottom:.45rem;font-weight:500;text-transform:uppercase;letter-spacing:.4px;}
.ins-val{font-family:'Outfit',sans-serif;font-size:2rem;font-weight:700;letter-spacing:-.8px;}
.ins-chg{font-size:.75rem;color:var(--green);margin-top:.2rem;}

/* ── FOCUS BARS ── */
.focus-bars{display:flex;align-items:flex-end;gap:5px;height:88px;margin:.9rem 0;}
.f-bar{flex:1;border-radius:4px 4px 0 0;background:rgba(124,92,255,.18);transition:all .2s;cursor:pointer;min-height:3px;}
.f-bar:hover,.f-bar.peak{background:var(--purple);}

/* ── HEATMAP ── */
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.h-cell{aspect-ratio:1;border-radius:4px;background:rgba(124,92,255,.07);}
.h-cell.l1{background:rgba(124,92,255,.14);}
.h-cell.l2{background:rgba(124,92,255,.28);}
.h-cell.l3{background:rgba(124,92,255,.48);}
.h-cell.l4{background:rgba(124,92,255,.72);}
.h-cell.today{outline:2px solid var(--purple2);outline-offset:1px;}

/* ── AI CARDS ── */
.ai-card{background:var(--card);border:1px solid rgba(124,92,255,.18);border-radius:20px;padding:1.15rem;display:flex;gap:.8rem;margin-bottom:.7rem;cursor:pointer;transition:all .18s;}
.ai-card:hover{background:rgba(124,92,255,.06);}
.ai-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--lav));display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;}
.ai-text{font-size:.845rem;line-height:1.55;color:var(--t2);}
.ai-tag{font-size:.68rem;font-weight:600;padding:.18rem .5rem;border-radius:7px;background:rgba(124,92,255,.14);color:var(--lav);margin-top:.4rem;display:inline-block;}

/* ── FORM ── */
.form-group{margin-bottom:1.1rem;}
.form-label{display:block;font-size:.78rem;font-weight:600;color:var(--t2);margin-bottom:.45rem;letter-spacing:.2px;}
.form-input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:.8rem .95rem;color:#fff;font-size:.875rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .18s;}
.form-input:focus{border-color:rgba(124,92,255,.5);background:rgba(124,92,255,.04);}
.form-input::placeholder{color:var(--t3);}
select.form-input option{background:#14182E;color:#fff;}
.energy-sel{display:flex;gap:.45rem;}
.e-btn{flex:1;padding:.55rem;border-radius:12px;border:1px solid var(--card-b);background:var(--card);color:var(--t2);font-size:.78rem;cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif;text-align:center;}
.e-btn:hover,.e-btn.sel{background:rgba(124,92,255,.16);border-color:var(--purple);color:var(--purple2);}

/* ── SETTINGS ── */
.settings-section{margin-bottom:1.75rem;}
.s-section-title{font-size:.67rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:.65rem;padding:0 .2rem;}
.s-row{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.15rem;background:var(--card);border:1px solid var(--card-b);margin-bottom:2px;cursor:pointer;transition:background .15s;}
.s-row:first-of-type{border-radius:20px 20px 5px 5px;}
.s-row:last-of-type{border-radius:5px 5px 20px 20px;margin-bottom:0;}
.s-row:only-of-type{border-radius:20px;}
.s-row:hover{background:rgba(124,92,255,.05);}
.s-label{font-size:.875rem;font-weight:500;}
.s-val{font-size:.8rem;color:var(--t3);}
.toggle{width:42px;height:23px;border-radius:100px;background:rgba(255,255,255,.1);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--purple);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;transition:transform .2s;}
.toggle.on::after{transform:translateX(19px);}

/* ── BOTTOM NAV ── */
.bot-nav{display:none;position:fixed;bottom:1.3rem;left:50%;transform:translateX(-50%);background:rgba(16,19,43,.92);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.09);border-radius:100px;padding:.55rem .9rem;gap:.1rem;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.45);}
.bot-btn{width:46px;height:46px;border-radius:50%;border:none;background:none;color:var(--t3);font-size:1.05rem;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;}
.bot-btn.active{background:var(--purple);color:#fff;}

/* ── FAB ── */
.fab{position:fixed;bottom:5.2rem;right:1.4rem;width:54px;height:54px;border-radius:50%;background:var(--purple);border:none;color:#fff;font-size:1.5rem;cursor:pointer;box-shadow:0 4px 24px rgba(124,92,255,.5);display:none;align-items:center;justify-content:center;z-index:999;transition:all .18s;font-weight:300;}
.fab:hover{background:var(--purple2);transform:scale(1.06);}

/* ── MISC ── */
.divider{height:1px;background:var(--card-b);margin:1.4rem 0;}
.page{animation:fadeUp .28s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{display:none;}
  .main{margin-left:0;padding:1.4rem 1rem 7rem;}
  .bot-nav{display:flex;}
  .fab{display:flex;}
  .ins-grid{grid-template-columns:1fr 1fr;}
  .proj-grid{grid-template-columns:1fr 1fr;}
  .now-title{font-size:1.45rem;}
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:2px;}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">Do<span>One</span></div>
  <button class="nav-item active" data-page="home" onclick="goTo('home',this)">
    <div class="nav-icon">🏠</div>Home
  </button>
  <button class="nav-item" data-page="tasks" onclick="goTo('tasks',this)">
    <div class="nav-icon">✦</div>My Jobs
  </button>
  <button class="nav-item" data-page="calendar" onclick="goTo('calendar',this)">
    <div class="nav-icon">📅</div>Calendar
  </button>
  <button class="nav-item" data-page="insights" onclick="goTo('insights',this)">
    <div class="nav-icon">📊</div>Insights
  </button>
  <button class="nav-item" data-page="aimemory" onclick="goTo('aimemory',this)">
    <div class="nav-icon">🧠</div>AI Memory
  </button>
  <div style="flex:1"></div>
  <button class="nav-item" data-page="settings" onclick="goTo('settings',this)">
    <div class="nav-icon">⚙️</div>Settings
  </button>
</aside>

<!-- MAIN -->
<main class="main" id="main"></main>

</div>

<!-- BOTTOM NAV -->
<nav class="bot-nav">
  <button class="bot-btn active" data-page="home" onclick="goTo('home',this)">🏠</button>
  <button class="bot-btn" data-page="tasks" onclick="goTo('tasks',this)">✦</button>
  <button class="bot-btn" data-page="calendar" onclick="goTo('calendar',this)">📅</button>
  <button class="bot-btn" data-page="insights" onclick="goTo('insights',this)">📊</button>
  <button class="bot-btn" data-page="aimemory" onclick="goTo('aimemory',this)">🧠</button>
</nav>
<button class="fab" onclick="goTo('addtask',null)">+</button>

<script>
// ─────────────────────────────────────────────
// PAGE TEMPLATES
// ─────────────────────────────────────────────
const PAGES = {};

PAGES.home = () => `<div class="page">

  <!-- HEADER -->
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;">
    <div>
      <div style="font-family:'Outfit',sans-serif;font-size:1.7rem;font-weight:800;letter-spacing:-.5px;">Good morning, Alex ✦</div>
      <div style="color:var(--t2);font-size:.875rem;margin-top:.15rem;">Thursday, 7 May 2026</div>
      <div style="margin-top:.7rem;">
        <span style="display:inline-flex;align-items:center;gap:.4rem;background:rgba(251,146,60,.14);color:#FB923C;border:1px solid rgba(251,146,60,.2);border-radius:30px;padding:.28rem .75rem;font-size:.78rem;font-weight:600;">🔥 14-day streak</span>
      </div>
    </div>
    <div style="width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--lav));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.05rem;flex-shrink:0;font-family:'Outfit',sans-serif;">A</div>
  </div>

  <!-- NOW CARD -->
  <div class="now-card">
    <div class="now-label"><span class="now-dot"></span>Do this now</div>
    <div class="now-title">Write intro section<br>for Research Paper</div>
    <div class="now-meta">
      <span>⏱ 45 mins</span>
      <span>🎯 High priority</span>
      <span>⚡ Medium energy</span>
      <span>📚 Study</span>
    </div>
    <div class="ai-note">
      <span style="flex-shrink:0;">✦</span>
      Best time for deep work based on your history. You complete 78% more tasks in morning sessions.
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;font-size:.76rem;color:var(--t3);margin-top:.75rem;">
      <span>Session progress</span>
      <span style="color:var(--lav);font-weight:600;">35% done</span>
    </div>
    <div class="pbar-wrap" style="margin:.4rem 0 .5rem;">
      <div class="pbar" style="width:35%"></div>
    </div>
    <div style="font-size:.75rem;color:var(--t3);">Est. completion · 10:45 AM</div>
    <div class="action-btns">
      <button class="btn btn-p" onclick="openFocusTimer()">⚡ Start Focus</button>
      <button class="btn btn-s">✓ Done</button>
      <button class="btn btn-g">→ Skip</button>
    </div>
  </div>

  <!-- ACTIVE JOBS -->
  <div class="section-label" style="margin-top:1.75rem;">Active Jobs</div>
  <div class="proj-grid" style="margin-bottom:1.75rem;">
    ${[
      {icon:'📝',name:'Research Paper',due:'May 20',sess:3,pct:35,c:'var(--purple)'},
      {icon:'🎨',name:'Portfolio Redesign',due:'Jun 1',sess:8,pct:20,c:'var(--blue)'},
      {icon:'💡',name:'Side Project MVP',due:'May 30',sess:12,pct:60,c:'var(--green)'},
    ].map(p=>`
    <div class="proj-card" onclick="goTo('jobdetail',null)">
      <div class="proj-icon" style="background:${p.c}18;">${p.icon}</div>
      <div class="proj-name">${p.name}</div>
      <div class="proj-meta">Due ${p.due} · ${p.sess} sessions left</div>
      <div style="margin-top:.7rem;">
        <div class="pbar-wrap" style="height:4px;">
          <div class="pbar" style="width:${p.pct}%;background:linear-gradient(90deg,${p.c},var(--lav));"></div>
        </div>
        <div style="font-size:.7rem;color:var(--t3);margin-top:.28rem;">${p.pct}% complete</div>
      </div>
    </div>`).join('')}
  </div>

  <!-- TODAY'S SESSIONS -->
  <div class="section-label">Today's Sessions</div>
  <div class="card" style="margin-bottom:1.5rem;">
    ${[
      {t:'10:00',n:'Research Paper — Intro Section',d:'45 min · Deep work',dot:'var(--purple)',tag:'<span class="tag tg-p">Now</span>'},
      {t:'11:00',n:'Portfolio Redesign — Wireframes',d:'60 min · Creative',dot:'var(--blue)',tag:'<span class="tag tg-b">Up next</span>'},
      {t:'14:00',n:'Side Project — Backend setup',d:'90 min · Coding',dot:'var(--green)',tag:'<span class="tag tg-g">Planned</span>'},
      {t:'16:30',n:'Rest & Review',d:'30 min · Light',dot:'var(--orange)',tag:'<span class="tag tg-o">Rest</span>'},
    ].map(s=>`
    <div class="sess-item">

    <div style="font-size:.73rem;color:var(--t3);">DoOne v1.0.0 · Made with ✦ for focused minds</div>
  </div>
</div>`;

// ─────────────────────────────────────────────
// FOCUS TIMER MODAL
// ─────────────────────────────────────────────
function openFocusTimer(){
  const old=document.getElementById('fm');
  if(old)old.remove();
  const m=document.createElement('div');
  m.id='fm';
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(12px);z-index:3000;display:flex;align-items:center;justify-content:center;padding:1.5rem;';
  m.innerHTML=`
  <div style="background:var(--bg3);border:1px solid rgba(124,92,255,.3);border-radius:28px;padding:2rem 1.8rem;max-width:340px;width:100%;text-align:center;animation:fadeUp .28s ease;">
    <div style="font-size:.67rem;letter-spacing:2px;color:var(--purple2);font-weight:700;margin-bottom:.9rem;text-transform:uppercase;">Focus Session</div>
    <div style="font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:.3rem;">Research Paper — Intro</div>
    <div style="font-size:.82rem;color:var(--t3);margin-bottom:1.8rem;">45 minutes · Deep Work Mode</div>
    <div style="font-family:'Outfit',sans-serif;font-size:4.2rem;font-weight:900;color:var(--purple2);letter-spacing:-3px;margin-bottom:.4rem;line-height:1;" id="td">45:00</div>
    <div style="font-size:.77rem;color:var(--t3);margin-bottom:1.6rem;">🔕 Notifications paused · Stay in flow</div>
    <div class="pbar-wrap" style="margin-bottom:1.8rem;"><div class="pbar" id="tb" style="width:0%;transition:none;"></div></div>
    <div style="display:flex;gap:.6rem;justify-content:center;">
      <button class="btn btn-g" onclick="document.getElementById('fm').remove()">✕ Cancel</button>
      <button class="btn btn-p" id="pb" onclick="tp()">⏸ Pause</button>
    </div>
  </div>`;
  document.body.appendChild(m);

  let secs=2700,paused=false,timer=null;
  function tick(){
    if(!paused&&secs>0){secs--;update();}
    if(document.getElementById('fm')&&secs>0){timer=setTimeout(tick,1000);}
  }
  function update(){
    const mn=Math.floor(secs/60),sc=secs%60;
    const td=document.getElementById('td'),tb=document.getElementById('tb');
    if(td)td.textContent=`${String(mn).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
    if(tb)tb.style.width=`${((2700-secs)/2700*100).toFixed(1)}%`;
  }
  window.tp=()=>{
    paused=!paused;
    const pb=document.getElementById('pb');
    if(pb)pb.textContent=paused?'▶ Resume':'⏸ Pause';
    if(!paused)tick();
  };
  timer=setTimeout(tick,1000);
  m.addEventListener('click',e=>{if(e.target===m){clearTimeout(timer);m.remove();}});
}

// ─────────────────────────────────────────────
// ROUTING
// ─────────────────────────────────────────────
function goTo(page,btn){
  const fn=PAGES[page]||PAGES.home;
  document.getElementById('main').innerHTML=fn();

  // sync sidebar
  document.querySelectorAll('.sidebar .nav-item').forEach(b=>{
    b.classList.toggle('active',b.dataset.page===page);
    b.querySelector('.nav-icon') && (b.querySelector('.nav-icon').style.background=b.dataset.page===page?'var(--purple)':'');
  });

  // sync bottom nav
  document.querySelectorAll('.bot-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.page===page);
  });

  window.scrollTo(0,0);
}

// energy buttons helper
document.addEventListener('click',e=>{
  if(e.target.classList.contains('e-btn')){
    e.target.closest('.energy-sel').querySelectorAll('.e-btn').forEach(b=>b.classList.remove('sel'));
    e.target.classList.add('sel');
  }
});

// init
goTo('home',null);
</script>
